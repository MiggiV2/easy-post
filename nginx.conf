events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Enable Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    server {
        # We will copy the 'out' directory to /usr/share/nginx/html/blog
        # So the root should be /usr/share/nginx/html
        root /usr/share/nginx/html;

        # Disable absolute redirects to prevent protocol downgrade (HTTPS -> HTTP)
        # when Nginx is behind a reverse proxy
        absolute_redirect off;
        
        index index.html;

        # Cache Next.js static assets (immutable)
        location ^~ /blog/_next/static/ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            try_files $uri =404;
        }

        # Cache other static assets
        location ~* \.(?:jpg|jpeg|gif|png|ico|svg|webp)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            try_files $uri =404;
        }

        # Handle requests. Since basePath is /blog, most requests will start with /blog
        location / {
            # HTML files should not be cached aggressively to ensure updates are seen
            add_header Cache-Control "public, max-age=0, must-revalidate";
            try_files $uri $uri.html $uri/ =404;
        }
        
        # Redirect root to /blog if desired, or just let it 404 if no index.html at root
        location = / {
            return 301 /blog;
        }

        # Force content-type for opengraph-image
        location = /blog/opengraph-image {
            default_type image/png;
        }
    }
}
